<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hulpfiches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --surface: #fff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --accent: #3b82f6;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.app-header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
}
.app-title {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: -.3px;
}
.app-title span { color: var(--accent); }
main {
  padding: 40px 28px;
  max-width: 900px;
  margin: 0 auto;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 24px;
}
.tile {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px 20px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: var(--text);
  transition: transform .18s, box-shadow .18s, border-color .18s;
  cursor: pointer;
}
.tile:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  border-color: var(--accent);
}
.tile-icon {
  font-size: 3rem;
  line-height: 1;
  user-select: none;
}
.tile-label {
  font-size: 1rem;
  font-weight: 800;
  text-align: center;
  line-height: 1.3;
}
.tile-sub {
  font-size: .8rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.4;
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Hulp<span>fiches</span></div>
</header>

<main>
  <div class="grid">

    <a class="tile" href="hulpfiche.html">
      <div class="tile-icon">➕</div>
      <div class="tile-label">Rekenen</div>
      <div class="tile-sub">Gehele getallen &amp; breuken</div>
    </a>

    <a class="tile" href="hulpfiche_machten.html">
      <div class="tile-icon">🔢</div>
      <div class="tile-label">Machten</div>
      <div class="tile-sub">Rekenen met machten</div>
    </a>

    <a class="tile" href="hulpfiche_vergelijkingen_nummersv2.html">
      <div class="tile-icon">🟰</div>
      <div class="tile-label">Vergelijkingen</div>
      <div class="tile-sub">Vergelijkingen oplossen</div>
    </a>

  </div>
</main>

</body>
</html>
